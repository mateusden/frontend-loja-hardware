<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TechStore</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <style>
        /* ====== PALETA DE CORES STARFORGE ====== */
        :root {
            --starforge-black: #000000;
            --starforge-dark: #0a0a0f;
            --starforge-card-bg: #111116;
            --starforge-white: #ffffff;
            --starforge-gray: #b0b0b0;
            --starforge-blue: #00eeff;
            --starforge-blue-alt: #2a96fa;
            --starforge-border: #22222a;
            --starforge-red: #ff4757;
            --starforge-green: #00d2a0;
        }
        
        /* ====== RESET E CONFIGURAÇÕES GERAIS ====== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: var(--starforge-black);
            color: var(--starforge-white);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 238, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(42, 150, 250, 0.05) 0%, transparent 50%);
        }
        
        /* ====== NAVEGAÇÃO - FIXADA NO TOPO ====== */
        .navbar {
            background-color: rgba(10, 10, 15, 0.98) !important;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--starforge-border);
            padding: 0.8rem 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1030;
        }
        
        .navbar-brand {
            font-weight: 800;
            font-size: 1.8rem;
            color: var(--starforge-white) !important;
            letter-spacing: -0.5px;
        }
        
        .navbar-brand i {
            color: var(--starforge-blue);
            margin-right: 8px;
        }
        
        /* ====== CONTAINER DE LOGIN ====== */
        .login-container {
            background-color: var(--starforge-card-bg);
            border: 1px solid var(--starforge-border);
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 238, 255, 0.15);
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* ====== CABEÇALHO DO LOGIN ====== */
        .login-header {
            background: linear-gradient(135deg, rgba(0, 238, 255, 0.1) 0%, rgba(42, 150, 250, 0.1) 100%);
            padding: 2.5rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--starforge-border);
            position: relative;
            overflow: hidden;
        }
        
        .login-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 0%, rgba(0, 238, 255, 0.2) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .login-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--starforge-blue), var(--starforge-blue-alt));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 1;
        }
        
        .login-header p {
            color: var(--starforge-gray);
            font-size: 1rem;
            position: relative;
            z-index: 1;
        }
        
        /* ====== FORMULÁRIO ====== */
        .login-form-container {
            padding: 2rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--starforge-white);
            font-size: 0.95rem;
        }
        
        .input-group {
            position: relative;
        }
        
        .form-input {
            width: 100%;
            padding: 0.9rem 1rem;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--starforge-border);
            border-radius: 8px;
            color: var(--starforge-white);
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--starforge-blue);
            background-color: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(0, 238, 255, 0.1);
        }
        
        .form-input.error {
            border-color: var(--starforge-red);
        }
        
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--starforge-gray);
            cursor: pointer;
            padding: 0.25rem;
            transition: color 0.2s;
            z-index: 2;
        }
        
        .password-toggle:hover {
            color: var(--starforge-blue);
        }
        
        /* ====== MENSAGENS DE ERRO ====== */
        .error-message {
            color: var(--starforge-red);
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
            padding-left: 0.5rem;
        }
        
        .error-message.show {
            display: block;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* ====== BOTÃO DE SUBMISSÃO ====== */
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--starforge-blue) 0%, var(--starforge-blue-alt) 100%);
            color: var(--starforge-black);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }
        
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 238, 255, 0.2);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        
        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-top-color: var(--starforge-black);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* ====== MENSAGEM DE SUCESSO ====== */
        .success-message {
            background-color: rgba(0, 210, 160, 0.1);
            border: 1px solid rgba(0, 210, 160, 0.3);
            color: var(--starforge-green);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            margin-top: 1.5rem;
            display: none;
            animation: slideDown 0.3s ease;
        }
        
        .success-message.show {
            display: block;
        }
        
        /* ====== RODAPÉ DO LOGIN ====== */
        .login-footer {
            padding: 1.5rem 2rem;
            text-align: center;
            border-top: 1px solid var(--starforge-border);
            background-color: rgba(255, 255, 255, 0.02);
        }
        
        .login-footer p {
            color: var(--starforge-gray);
            margin-bottom: 0.75rem;
        }
        
        .register-link {
            color: var(--starforge-blue);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .register-link:hover {
            color: var(--starforge-blue-alt);
            text-decoration: underline;
        }
        
        /* ====== NOTIFICAÇÕES ====== */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1060;
            min-width: 300px;
            display: none;
        }
        
        .alert {
            background-color: var(--starforge-card-bg);
            border: 1px solid var(--starforge-border);
            color: var(--starforge-white);
            border-radius: 8px;
            padding: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .alert-success {
            border-color: var(--starforge-green);
        }
        
        .alert-warning {
            border-color: #ffc107;
        }
        
        .alert-danger {
            border-color: var(--starforge-red);
        }
        
        /* ====== RESPONSIVIDADE ====== */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .login-container {
                max-width: 100%;
            }
            
            .login-header {
                padding: 2rem 1.5rem;
            }
            
            .login-header h1 {
                font-size: 1.8rem;
            }
            
            .login-form-container {
                padding: 1.5rem;
            }
            
            .login-footer {
                padding: 1.25rem 1.5rem;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .login-header {
                padding: 1.75rem 1.25rem;
            }
            
            .login-form-container {
                padding: 1.25rem;
            }
            
            .form-input {
                padding: 0.8rem 0.9rem;
            }
            
            .submit-btn {
                padding: 0.9rem;
            }
        }
        
        /* ====== VOLTAR PARA HOME ====== */
        .back-to-home {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--starforge-gray);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
            z-index: 100;
        }
        
        .back-to-home:hover {
            color: var(--starforge-blue);
        }
    </style>
</head>
<body>
    <!-- Link para voltar à home -->
    <a href="index.html" class="back-to-home">
        <i class="bi bi-arrow-left"></i> Voltar à Loja
    </a>
    
    <!-- Container Principal -->
    <div class="login-container">
        <!-- Cabeçalho -->
        <div class="login-header">
            <h1><i class="bi bi-cpu"></i> TechStore</h1>
            <p>Faça login para continuar</p>
        </div>
        
        <!-- Formulário -->
        <div class="login-form-container">
            <form id="login-form">
                <!-- Email -->
                <div class="form-group">
                    <label for="email" class="form-label">Email:</label>
                    <div class="input-group">
                        <input type="email" id="email" class="form-input" required placeholder="seu@email.com">
                    </div>
                    <div class="error-message" id="email-error">Por favor, insira um email válido</div>
                </div>
                
                <!-- Senha -->
                <div class="form-group">
                    <label for="password" class="form-label">Senha:</label>
                    <div class="input-group">
                        <input type="password" id="password" class="form-input" required placeholder="Mínimo 8 caracteres">
                        <button type="button" class="password-toggle" id="password-toggle">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                    <div class="error-message" id="password-error">A senha deve ter pelo menos 8 caracteres, incluindo letras e números</div>
                </div>
                
                <!-- Botão de Submit -->
                <button type="submit" class="submit-btn" id="submit-btn">
                    <span id="btn-text">Entrar</span>
                </button>
                
                <!-- Mensagem de Sucesso -->
                <div class="success-message" id="success-message">
                    <i class="bi bi-check-circle-fill"></i> Login realizado com sucesso!
                </div>
            </form>
        </div>
        
        <!-- Rodapé -->
        <div class="login-footer">
            <p>Não tem uma conta?</p>
            <a href="register.html" class="register-link">
                <i class="bi bi-person-plus"></i> Criar uma conta
            </a>
        </div>
    </div>
    
    <!-- Notificação -->
    <div class="notification" id="notification">
        <div class="alert alert-success alert-dismissible fade show" role="alert">
            <strong id="notificationTitle">Sucesso!</strong> 
            <span id="notificationMessage">Produto adicionado ao carrinho.</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Elementos do DOM
            const loginForm = document.getElementById('login-form');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const passwordToggle = document.getElementById('password-toggle');
            const emailError = document.getElementById('email-error');
            const passwordError = document.getElementById('password-error');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const successMessage = document.getElementById('success-message');
            
            // Estado do formulário
            let isSubmitting = false;
            
            // Toggle de visibilidade da senha
            passwordToggle.addEventListener('click', function() {
                const icon = passwordToggle.querySelector('i');
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    icon.className = 'bi bi-eye-slash';
                } else {
                    passwordInput.type = 'password';
                    icon.className = 'bi bi-eye';
                }
            });
            
            // Validação em tempo real
            emailInput.addEventListener('blur', validateEmail);
            passwordInput.addEventListener('blur', validatePassword);
            
            // Submissão do formulário
            loginForm.addEventListener('submit', handleLogin);
            
            // Funções de validação
            function validateEmail() {
                const email = emailInput.value.trim();
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                
                if (!email) {
                    showError(emailInput, emailError, 'Email é obrigatório');
                    return false;
                }
                
                if (!emailRegex.test(email)) {
                    showError(emailInput, emailError, 'Por favor, insira um email válido');
                    return false;
                }
                
                hideError(emailInput, emailError);
                return true;
            }
            
            function validatePassword() {
                const password = passwordInput.value.trim();
                
                if (!password) {
                    showError(passwordInput, passwordError, 'Senha é obrigatória');
                    return false;
                }
                
                if (password.length < 8) {
                    showError(passwordInput, passwordError, 'A senha deve ter pelo menos 8 caracteres');
                    return false;
                }
                
                // Verifica se contém pelo menos uma letra e um número
                if (!/(?=.*[a-zA-Z])(?=.*[0-9])/.test(password)) {
                    showError(passwordInput, passwordError, 'A senha deve incluir letras e números');
                    return false;
                }
                
                hideError(passwordInput, passwordError);
                return true;
            }
            
            // Funções de auxílio para erros
            function showError(input, errorElement, message) {
                input.classList.add('error');
                errorElement.textContent = message;
                errorElement.classList.add('show');
            }
            
            function hideError(input, errorElement) {
                input.classList.remove('error');
                errorElement.classList.remove('show');
            }
            
            // Mostrar notificação
            function showNotification(message, type = 'success') {
                const notification = document.getElementById("notification");
                if (!notification) return;

                const alert = notification.querySelector(".alert");
                if (alert) {
                    alert.className = `alert alert-${type} alert-dismissible fade show`;
                    
                    const titleMap = {
                        'success': 'Sucesso!',
                        'warning': 'Atenção!',
                        'error': 'Erro!',
                        'info': 'Informação!'
                    };
                    
                    alert.querySelector("strong").textContent = titleMap[type] || 'Sucesso!';
                    alert.querySelector("#notificationMessage").textContent = message;
                    notification.style.display = "block";

                    setTimeout(() => {
                        notification.style.display = "none";
                    }, 3000);
                }
            }
            
            // Manipulador de login
            async function handleLogin(event) {
                event.preventDefault();
                
                // Validar campos
                const isEmailValid = validateEmail();
                const isPasswordValid = validatePassword();
                
                if (!isEmailValid || !isPasswordValid) {
                    return;
                }
                
                // Prevenir múltiplos envios
                if (isSubmitting) return;
                
                isSubmitting = true;
                submitBtn.disabled = true;
                btnText.innerHTML = '<div class="loading-spinner"></div> Entrando...';
                
                try {
                    const email = emailInput.value.trim();
                    const password = passwordInput.value.trim();
                    
                    const response = await fetch('http://localhost:3000/api/users/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email, password })
                    });
                    
                    const data = await response.json();

                    console.log('Resposta da API:', data);
                    
                    if (response.ok) {
                        // Login bem-sucedido
                        successMessage.classList.add('show');
                        showNotification('Login realizado com sucesso!', 'success');
                        
                        // Armazenar dados do usuário
                        if (data.token) {
                            localStorage.setItem('token', data.token);
                            localStorage.setItem('userLoggedIn', 'true');
                            localStorage.setItem('userName', data.user?.name || 'Usuário');
                            localStorage.setItem('userEmail', data.user?.email || email);
                            localStorage.setItem('userId', data.user?.id || '');
                            
                            // Mostrar nome do usuário se disponível
                            if (data.user?.name) {
                                successMessage.innerHTML = `<i class="bi bi-check-circle-fill"></i> Bem-vindo(a), ${data.user.name}!`;
                            }
                        }
                        
                        // Redirecionar após breve delay
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1500);
                    } else {
                        // Tratar erros específicos da API
                        let errorMessage = 'Erro ao fazer login';
                        
                        if (data.message) {
                            errorMessage = data.message;
                        } else if (response.status === 401) {
                            errorMessage = 'Email ou senha incorretos';
                        } else if (response.status === 404) {
                            errorMessage = 'Usuário não encontrado';
                        }
                        
                        throw new Error(errorMessage);
                    }
                } catch (error) {
                    // Tratar erros de rede ou da API
                    if (error.name === 'TypeError') {
                        showError(emailInput, emailError, 'Erro de conexão. Verifique sua internet.');
                        showNotification('Erro de conexão com o servidor', 'error');
                    } else {
                        showError(emailInput, emailError, error.message);
                        showNotification(error.message, 'error');
                    }
                    
                    console.error('Erro no login:', error);
                } finally {
                    isSubmitting = false;
                    submitBtn.disabled = false;
                    btnText.textContent = 'Entrar';
                }
            }
            
            // Foco no primeiro campo ao carregar
            emailInput.focus();
        });
    </script>
</body>
</html>
